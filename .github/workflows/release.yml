name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  build:
    name: Build and test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            artifact: libfon_native.so
          - os: windows-latest
            artifact: fon_native.dll
          - os: macos-latest
            artifact: libfon_native.dylib

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('native/Cargo.toml', 'native/fon-rust/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build fon_native (release)
        run: cargo build --release --manifest-path native/Cargo.toml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install gcc (Windows)
        if: runner.os == 'Windows'
        run: choco install mingw --no-progress -y

      - name: Run Go tests (Linux / macOS)
        if: runner.os != 'Windows'
        run: go test -v ./...
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: "-L${{ github.workspace }}/native/target/release -lfon_native -Wl,-rpath,${{ github.workspace }}/native/target/release"

      - name: Run Go tests (Windows)
        if: runner.os == 'Windows'
        run: go test -v ./...
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: "-L${{ github.workspace }}/native/target/release -lfon_native"

      - name: Upload native library artifact
        uses: actions/upload-artifact@v4
        with:
          name: fon_native-${{ matrix.os }}
          path: native/target/release/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: FON.go ${{ env.RELEASE_TAG }}
          body: |
            ## FON.go ${{ env.RELEASE_TAG }}

            FON (Fast Object Notation) — a fast, human-readable, line-oriented serialization format.

            ### Installation

            ```
            go get github.com/FastObjectNotation/FON.go@${{ env.RELEASE_TAG }}
            ```

            ### Native library

            The pre-built `fon_native` shared libraries for all three platforms are
            attached below. Copy the appropriate file onto your library search path
            (or bundle it alongside your binary) before running applications that
            import this package.

            > Go modules resolve directly from the git tag — no separate registry step required.
          files: artifacts/**/*
          draft: false
          prerelease: false
